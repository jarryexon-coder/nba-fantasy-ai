name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the code from your repository
    - uses: actions/checkout@v4

    # 2. Set up Java (JDK 17 shown as a modern standard)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        cache-dependency-path: ./back-end/pom.xml  # <-- FIX 1: Scoped cache

    # 3. [Optional] Debug step - list files to verify path
    - name: Debug - List project structure
      run: |
        pwd
        ls -la
        echo "--- Checking back-end folder ---"
        ls -la ./back-end/

    # 4. Build and test the project with Maven
    - name: Build and Test with Maven
      run: mvn --batch-mode --update-snapshots verify
      working-directory: ./back-end  # <-- FIX 2: The most critical fix
