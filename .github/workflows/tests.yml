name: Full-Stack CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: Tests your Java Backend
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build and Test with Maven
        run: mvn --batch-mode --update-snapshots verify
        working-directory: ./back-end
      - name: Upload Java Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-reports
          path: ./back-end/target/surefire-reports/

  # JOB 2: Tests your React Native Frontend
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests
        run: npm test

  # JOB 3: Deploys your Backend to Heroku (OPTIONAL - See setup below)
  deploy:
    runs-on: ubuntu-latest
    needs: [build, test-frontend] # Waits for both test jobs to pass
    if: github.ref == 'refs/heads/main' # Only runs on pushes to 'main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build Package for Deployment
        run: mvn --batch-mode clean package -DskipTests
        working-directory: ./back-end
      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.12.12
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          appdir: ./back-end
