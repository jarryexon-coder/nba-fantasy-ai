name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the code from your repository
    - uses: actions/checkout@v4

    # 2. Set up Java (JDK 17 shown as a modern standard)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven # This caches dependencies to speed up future runs

    # 3. Build and test the project with Maven
    - name: Build and Test with Maven
      run: mvn --batch-mode --update-snapshots verify
